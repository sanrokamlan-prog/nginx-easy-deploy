name: Test

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  bash:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check Bash syntax
        run: bash -n nginx-easy-deploy.sh tests/test_helpers.sh
      - name: Run helper tests
        run: bash tests/test_helpers.sh
      - name: Smoke-test command interface
        run: |
          bash nginx-easy-deploy.sh --help >/dev/null
          bash nginx-easy-deploy.sh --lang en --help | grep -q "native Nginx deployment"
          NGX_EASY_LANG=en bash nginx-easy-deploy.sh --help | grep -q "Common commands"
          test "$(bash nginx-easy-deploy.sh --version)" = "0.3.0"
