name: Test

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  bash:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check Bash syntax
        run: bash -n nginx-easy-deploy.sh tests/test_helpers.sh
      - name: Run helper tests
        run: bash tests/test_helpers.sh
